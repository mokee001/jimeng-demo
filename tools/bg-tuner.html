<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>故事改编页 背景参数实时调试</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0c0c10; color: #e6edf3; font-family: -apple-system, "PingFang SC", system-ui, sans-serif; }
  .app { display: grid; grid-template-columns: 420px 1fr; height: 100vh; }

  /* ================== 左侧：参数面板 ================== */
  .panel { padding: 16px 18px; overflow-y: auto; border-right: 1px solid #1f2329; background: #111418; }
  .panel h1 { font-size: 14px; margin: 0 0 14px; color: #8aa1b8; letter-spacing: .5px; text-transform: uppercase; }
  .group { background: #161a20; border: 1px solid #20262e; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
  .group h2 { font-size: 12px; margin: 0 0 10px; color: #c4d3e2; text-transform: uppercase; letter-spacing: .8px; }
  .row { display: grid; grid-template-columns: 1fr 64px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .row label { font-size: 12px; color: #9aa8b6; }
  .row .value { font-size: 12px; color: #cfe1ff; font-variant-numeric: tabular-nums; text-align: right; }
  .row.full { grid-template-columns: 1fr; }
  .row.full input[type="color"] { width: 100%; height: 30px; border: 1px solid #2a313a; border-radius: 6px; background: transparent; padding: 0; cursor: pointer; }
  input[type="range"] { width: 100%; }
  textarea { width: 100%; min-height: 90px; background: #0d1014; color: #cfe1ff; border: 1px solid #2a313a; border-radius: 6px; padding: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; resize: vertical; }
  .actions { display: flex; gap: 8px; margin-top: 6px; }
  .actions button { flex: 1; background: #1f6feb; color: #fff; border: 0; border-radius: 6px; padding: 8px 10px; font-size: 12px; cursor: pointer; }
  .actions button.secondary { background: #30363d; }
  .actions button:hover { filter: brightness(1.1); }
  .css-output { white-space: pre; }
  .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; vertical-align: middle; margin-right: 4px; border: 1px solid #2a313a; }

  /* ================== 右侧：预览 ================== */
  .stage { display: flex; align-items: center; justify-content: center; padding: 20px; background:
    radial-gradient(circle at 30% 30%, #1a1f26 0%, #0c0c10 70%);
  }
  .frame {
    position: relative;
    width: 390px; height: 753px;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 30px 60px rgba(0,0,0,.6);
    background: #000;
  }

  /* 与 styles.css 中 .intergen 相关样式保持等价 */
  .intergen { position: absolute; inset: 0; overflow: hidden; }
  .intergen-bg {
    position: absolute; inset: 0;
    background-color: var(--bg-base, #1e1e1a);
    background-image: url("assets/2242ac9f6f471954dc46f5b8cecfe80755c0a449.png");
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    filter: blur(var(--blur, 30px)) brightness(var(--brightness, 0.55));
    transform: scale(var(--scale, 1.2));
  }
  .intergen-overlay {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg,
      var(--ovl-c1, rgba(30,30,26,0.56)) 0%,
      var(--ovl-c2, rgba(18,18,16,0.70)) 66.6%,
      var(--ovl-c3, rgba(18,18,16,0.85)) 100%);
  }
  .intergen-bottom-mask {
    position: absolute; left: 0; bottom: 0; width: 100%;
    height: var(--mask-h, 146px);
    pointer-events: none;
    background: linear-gradient(180deg,
      rgba(0,0,0,0)      0%,
      rgba(0,0,0,0.004)  6.667%,
      rgba(0,0,0,0.020) 13.333%,
      rgba(0,0,0,0.047) 20%,
      rgba(0,0,0,0.086) 26.667%,
      rgba(0,0,0,0.137) 33.333%,
      rgba(0,0,0,0.200) 40%,
      rgba(0,0,0,0.267) 46.667%,
      rgba(0,0,0,0.333) 53.333%,
      rgba(0,0,0,0.400) 60%,
      rgba(0,0,0,0.463) 66.667%,
      rgba(0,0,0,0.514) 73.333%,
      rgba(0,0,0,0.553) 80%,
      rgba(0,0,0,0.580) 86.667%,
      rgba(0,0,0,0.596) 93.333%,
      rgba(0,0,0,var(--mask-end, 0.6)) 100%);
    opacity: var(--mask-opacity, 1);
  }

  /* 参考前景占位（仅示意，便于看背景效果） */
  .preview-fg {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
    color: #fff; pointer-events: none;
  }
  .preview-fg .t { margin-top: 72px; font-size: 24px; font-weight: 500; color: #ddeaf0; }
  .preview-fg .card {
    margin-top: 30px;
    width: 175px; height: 323px; border-radius: 28px;
    background: rgba(0,0,0,0.43);
    position: relative;
  }
  .preview-fg .card::before {
    content: ""; position: absolute; left: 4px; top: 4px;
    width: 167px; height: 275px; border-radius: 24px;
    background: url("assets/2242ac9f6f471954dc46f5b8cecfe80755c0a449.png") center/cover;
    border: 1px solid rgba(255,255,255,.12);
  }
  .preview-fg .card::after {
    content: ""; position: absolute; left: 4px; top: 4px;
    width: 167px; height: 275px; border-radius: 24px;
    background: rgba(0,0,0,.3);
  }
</style>
</head>
<body>
<div class="app">

  <!-- ================== 参数面板 ================== -->
  <aside class="panel">
    <h1>背景参数面板</h1>

    <div class="group">
      <h2>1. 模糊海报 .intergen-bg</h2>
      <div class="row"><label>blur (px)</label><span class="value" id="v-blur"></span></div>
      <input type="range" id="blur" min="0" max="80" step="1" value="30" />
      <div class="row"><label>brightness</label><span class="value" id="v-brightness"></span></div>
      <input type="range" id="brightness" min="0" max="2" step="0.01" value="0.55" />
      <div class="row"><label>scale</label><span class="value" id="v-scale"></span></div>
      <input type="range" id="scale" min="1" max="2" step="0.01" value="1.2" />
      <div class="row full">
        <label>底色 (无图时显示)</label>
        <input type="color" id="bg-base" value="#1e1e1a" />
      </div>
    </div>

    <div class="group">
      <h2>2. 渐变叠加 .intergen::after</h2>
      <div class="row full">
        <label><span class="swatch" id="sw1"></span>顶部 0% 颜色</label>
        <input type="color" id="ovl1c" value="#1e1e1a" />
      </div>
      <div class="row"><label>顶部 alpha</label><span class="value" id="v-ovl1a"></span></div>
      <input type="range" id="ovl1a" min="0" max="1" step="0.01" value="0.56" />

      <div class="row full" style="margin-top:6px;">
        <label><span class="swatch" id="sw2"></span>中段 66.6% 颜色</label>
        <input type="color" id="ovl2c" value="#121210" />
      </div>
      <div class="row"><label>中段 alpha</label><span class="value" id="v-ovl2a"></span></div>
      <input type="range" id="ovl2a" min="0" max="1" step="0.01" value="0.70" />

      <div class="row full" style="margin-top:6px;">
        <label><span class="swatch" id="sw3"></span>底部 100% 颜色</label>
        <input type="color" id="ovl3c" value="#121210" />
      </div>
      <div class="row"><label>底部 alpha</label><span class="value" id="v-ovl3a"></span></div>
      <input type="range" id="ovl3a" min="0" max="1" step="0.01" value="0.85" />
    </div>

    <div class="group">
      <h2>3. 底部遮罩 .intergen-bottom-mask</h2>
      <div class="row"><label>高度 (px)</label><span class="value" id="v-mask-h"></span></div>
      <input type="range" id="mask-h" min="0" max="400" step="1" value="146" />
      <div class="row"><label>末端 alpha (100%)</label><span class="value" id="v-mask-end"></span></div>
      <input type="range" id="mask-end" min="0" max="1" step="0.01" value="0.6" />
      <div class="row"><label>整体 opacity</label><span class="value" id="v-mask-opacity"></span></div>
      <input type="range" id="mask-opacity" min="0" max="1" step="0.01" value="1" />
    </div>

    <div class="group">
      <h2>导出 CSS</h2>
      <textarea id="out" class="css-output" readonly></textarea>
      <div class="actions">
        <button id="copy">复制 CSS</button>
        <button id="reset" class="secondary">重置</button>
      </div>
    </div>
  </aside>

  <!-- ================== 预览 ================== -->
  <main class="stage">
    <div class="frame" id="frame">
      <div class="intergen">
        <div class="intergen-bg"></div>
        <div class="intergen-overlay"></div>
        <div class="intergen-bottom-mask"></div>
      </div>
      <div class="preview-fg">
        <div class="t">你想怎么改变这个故事？</div>
        <div class="card"></div>
      </div>
    </div>
  </main>
</div>

<script>
(function () {
  const frame = document.getElementById('frame');

  // 默认值（与 styles.css 当前一致）
  const defaults = {
    blur: 30, brightness: 0.55, scale: 1.2, 'bg-base': '#1e1e1a',
    ovl1c: '#1e1e1a', ovl1a: 0.56,
    ovl2c: '#121210', ovl2a: 0.70,
    ovl3c: '#121210', ovl3a: 0.85,
    'mask-h': 146, 'mask-end': 0.6, 'mask-opacity': 1,
  };

  function hexToRgb(hex) {
    const m = hex.replace('#','').match(/.{2}/g);
    return m ? m.map(h => parseInt(h, 16)) : [0,0,0];
  }
  function rgba(hex, a) {
    const [r,g,b] = hexToRgb(hex);
    return `rgba(${r}, ${g}, ${b}, ${a})`;
  }

  function v(id) { return document.getElementById(id).value; }
  function setText(id, val) { document.getElementById('v-' + id).textContent = val; }
  function setSwatch(id, hex, a) {
    const el = document.getElementById(id);
    if (el) el.style.background = rgba(hex, a);
  }

  function apply() {
    const blur = +v('blur');
    const brightness = +v('brightness');
    const scale = +v('scale');
    const base = v('bg-base');
    const o1c = v('ovl1c'), o1a = +v('ovl1a');
    const o2c = v('ovl2c'), o2a = +v('ovl2a');
    const o3c = v('ovl3c'), o3a = +v('ovl3a');
    const mh = +v('mask-h'), me = +v('mask-end'), mo = +v('mask-opacity');

    frame.style.setProperty('--blur', blur + 'px');
    frame.style.setProperty('--brightness', brightness);
    frame.style.setProperty('--scale', scale);
    frame.style.setProperty('--bg-base', base);
    frame.style.setProperty('--ovl-c1', rgba(o1c, o1a));
    frame.style.setProperty('--ovl-c2', rgba(o2c, o2a));
    frame.style.setProperty('--ovl-c3', rgba(o3c, o3a));
    frame.style.setProperty('--mask-h', mh + 'px');
    frame.style.setProperty('--mask-end', me);
    frame.style.setProperty('--mask-opacity', mo);

    setText('blur', blur + 'px');
    setText('brightness', brightness.toFixed(2));
    setText('scale', scale.toFixed(2));
    setText('ovl1a', o1a.toFixed(2));
    setText('ovl2a', o2a.toFixed(2));
    setText('ovl3a', o3a.toFixed(2));
    setText('mask-h', mh + 'px');
    setText('mask-end', me.toFixed(2));
    setText('mask-opacity', mo.toFixed(2));
    setSwatch('sw1', o1c, o1a);
    setSwatch('sw2', o2c, o2a);
    setSwatch('sw3', o3c, o3a);

    document.getElementById('out').value =
`/* ===== 故事改编页背景 ===== */
.intergen-bg {
  position: absolute;
  inset: 0;
  background: ${base} url("assets/2242ac9f6f471954dc46f5b8cecfe80755c0a449.png") center/cover no-repeat;
  filter: blur(${blur}px) brightness(${brightness});
  transform: scale(${scale});
}
.intergen::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(180deg,
    ${rgba(o1c, o1a)} 0%,
    ${rgba(o2c, o2a)} 66.6%,
    ${rgba(o3c, o3a)} 100%);
}
.intergen-bottom-mask {
  position: absolute;
  left: 0; bottom: 0;
  width: 390px;
  height: ${mh}px;
  pointer-events: none;
  opacity: ${mo};
  background: linear-gradient(180deg,
    rgba(0,0,0,0)      0%,
    rgba(0,0,0,0.004)  6.667%,
    rgba(0,0,0,0.020) 13.333%,
    rgba(0,0,0,0.047) 20%,
    rgba(0,0,0,0.086) 26.667%,
    rgba(0,0,0,0.137) 33.333%,
    rgba(0,0,0,0.200) 40%,
    rgba(0,0,0,0.267) 46.667%,
    rgba(0,0,0,0.333) 53.333%,
    rgba(0,0,0,0.400) 60%,
    rgba(0,0,0,0.463) 66.667%,
    rgba(0,0,0,0.514) 73.333%,
    rgba(0,0,0,0.553) 80%,
    rgba(0,0,0,0.580) 86.667%,
    rgba(0,0,0,0.596) 93.333%,
    rgba(0,0,0,${me}) 100%);
}`;
  }

  // 绑定所有控件
  Object.keys(defaults).forEach(id => {
    document.getElementById(id).addEventListener('input', apply);
  });

  document.getElementById('reset').addEventListener('click', () => {
    Object.entries(defaults).forEach(([id, val]) => {
      document.getElementById(id).value = val;
    });
    apply();
  });

  document.getElementById('copy').addEventListener('click', async () => {
    const ta = document.getElementById('out');
    try {
      await navigator.clipboard.writeText(ta.value);
      const btn = document.getElementById('copy');
      const old = btn.textContent;
      btn.textContent = '已复制 ✓';
      setTimeout(() => btn.textContent = old, 1200);
    } catch (e) {
      ta.select(); document.execCommand('copy');
    }
  });

  apply();
})();
</script>
</body>
</html>
