<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>悬浮抖动调试器</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #1a1a18;
    color: #ddeaf0;
    font-family: -apple-system, "PingFang SC", sans-serif;
    display: flex;
    min-height: 100vh;
  }
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #282820;
    position: relative;
  }
  .card {
    width: 175px;
    height: 323px;
    border-radius: 28px;
    background: rgba(0, 0, 0, 0.43);
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }
  .card-inner {
    position: absolute;
    left: 4px;
    top: 4px;
    width: 167px;
    height: 275px;
    border-radius: 24px;
    background: linear-gradient(135deg, #6b5b8a, #34526b);
    border: 1px solid rgba(255, 255, 255, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.55);
    font-size: 13px;
  }
  .card-tip {
    position: absolute;
    left: 0; right: 0; bottom: 14px;
    text-align: center;
    font-size: 14px;
    color: #ddeaf0;
  }
  .panel {
    width: 360px;
    padding: 20px;
    background: #111;
    overflow-y: auto;
    border-left: 1px solid #333;
  }
  h2 { margin: 0 0 16px; font-size: 16px; color: #fff; }
  .group { margin-bottom: 18px; padding: 12px; background: #1d1d1b; border-radius: 8px; }
  .group-title { font-size: 13px; color: #a0a89c; margin-bottom: 10px; font-weight: 600; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .row label { width: 130px; font-size: 12px; color: #c4cdc1; }
  .row input[type=range] { flex: 1; }
  .row .val { width: 56px; text-align: right; font-variant-numeric: tabular-nums; font-size: 12px; color: #fff; }
  .keyframe { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .keyframe .stop { width: 36px; font-size: 11px; color: #888; }
  .keyframe input[type=number] { width: 60px; background: #2a2a26; color: #fff; border: 1px solid #333; padding: 3px 6px; border-radius: 4px; font-size: 12px; }
  .keyframe .label { width: 14px; font-size: 11px; color: #888; }
  pre {
    background: #000;
    padding: 12px;
    border-radius: 8px;
    font-size: 11px;
    color: #9ad5a8;
    overflow: auto;
    max-height: 240px;
    white-space: pre-wrap;
  }
  button {
    background: #2563eb;
    color: #fff;
    border: 0;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    margin-right: 6px;
  }
  button.secondary { background: #374151; }
</style>
</head>
<body>
  <div class="stage">
    <div class="card" id="card">
      <div class="card-inner">视频卡（占位）</div>
      <div class="card-tip">拖动以进行选择</div>
    </div>
  </div>

  <div class="panel">
    <h2>悬浮抖动调试</h2>

    <div class="group">
      <div class="group-title">基础</div>
      <div class="row">
        <label>时长 (s)</label>
        <input type="range" id="dur" min="0.5" max="6" step="0.1" value="2.6" />
        <div class="val" id="durV">2.6</div>
      </div>
      <div class="row">
        <label>缓动</label>
        <select id="ease" style="flex:1; background:#2a2a26;color:#fff;border:1px solid #333;padding:4px;border-radius:4px;">
          <option>ease-in-out</option>
          <option>ease</option>
          <option>linear</option>
          <option>ease-in</option>
          <option>ease-out</option>
          <option>cubic-bezier(0.4, 0, 0.2, 1)</option>
          <option>cubic-bezier(0.34, 1.1, 0.64, 1)</option>
        </select>
      </div>
      <div class="row">
        <label>整体幅度倍率</label>
        <input type="range" id="scale" min="0.2" max="3" step="0.05" value="1" />
        <div class="val" id="scaleV">1</div>
      </div>
    </div>

    <div class="group">
      <div class="group-title">关键帧（X / Y / 旋转°）</div>
      <div id="keyframes"></div>
    </div>

    <div class="group">
      <div class="group-title">输出</div>
      <button id="copy">复制 CSS</button>
      <button class="secondary" id="reset">恢复默认</button>
      <pre id="out"></pre>
    </div>
  </div>

<script>
  // 默认关键帧：[stop%, x, y, rot]
  var DEFAULTS = [
    [0,    0,    0,    0],
    [20,  -1.2, -2,   -0.4],
    [40,   1.5, -3,    0.5],
    [60,  -1,   -1.5, -0.3],
    [80,   1.2, -2.5,  0.4],
    [100,  0,    0,    0],
  ];
  var state = JSON.parse(JSON.stringify(DEFAULTS));

  var kfWrap = document.getElementById('keyframes');
  function renderKeyframes() {
    kfWrap.innerHTML = '';
    state.forEach(function (kf, i) {
      var row = document.createElement('div');
      row.className = 'keyframe';
      row.innerHTML =
        '<span class="stop">' + kf[0] + '%</span>' +
        '<span class="label">X</span><input type="number" step="0.1" value="' + kf[1] + '" data-i="' + i + '" data-k="1" />' +
        '<span class="label">Y</span><input type="number" step="0.1" value="' + kf[2] + '" data-i="' + i + '" data-k="2" />' +
        '<span class="label">R</span><input type="number" step="0.1" value="' + kf[3] + '" data-i="' + i + '" data-k="3" />';
      kfWrap.appendChild(row);
    });
    kfWrap.querySelectorAll('input').forEach(function (inp) {
      inp.addEventListener('input', function () {
        var i = +inp.dataset.i, k = +inp.dataset.k;
        state[i][k] = parseFloat(inp.value) || 0;
        apply();
      });
    });
  }

  var styleEl = document.createElement('style');
  document.head.appendChild(styleEl);

  function apply() {
    var dur = +document.getElementById('dur').value;
    var ease = document.getElementById('ease').value;
    var mul = +document.getElementById('scale').value;
    document.getElementById('durV').textContent = dur.toFixed(1);
    document.getElementById('scaleV').textContent = mul.toFixed(2);

    var frames = state.map(function (kf) {
      var x = (kf[1] * mul).toFixed(2);
      var y = (kf[2] * mul).toFixed(2);
      var r = (kf[3] * mul).toFixed(2);
      return '  ' + kf[0] + '% { transform: translate(' + x + 'px, ' + y + 'px) rotate(' + r + 'deg); }';
    }).join('\n');

    var css =
      '@keyframes ig-center-float {\n' + frames + '\n}\n' +
      '.card { animation: ig-center-float ' + dur + 's ' + ease + ' infinite; }\n';

    styleEl.textContent = css;
    document.getElementById('out').textContent =
      '@keyframes ig-center-float {\n' + frames + '\n}\n\n' +
      '/* 应用到中央卡 + 视频 */\n' +
      '.frame.story-end.intergen-ready .ig-center,\n' +
      '.frame.story-end.intergen-ready .bg-video {\n' +
      '  animation: ig-center-float ' + dur + 's ' + ease + ' infinite;\n' +
      '}';
  }

  ['dur','scale'].forEach(function (id) {
    document.getElementById(id).addEventListener('input', apply);
  });
  document.getElementById('ease').addEventListener('change', apply);
  document.getElementById('copy').addEventListener('click', function () {
    navigator.clipboard.writeText(document.getElementById('out').textContent);
    this.textContent = '已复制 ✓';
    setTimeout(function(){ document.getElementById('copy').textContent='复制 CSS'; }, 1200);
  });
  document.getElementById('reset').addEventListener('click', function () {
    state = JSON.parse(JSON.stringify(DEFAULTS));
    document.getElementById('dur').value = 2.6;
    document.getElementById('scale').value = 1;
    document.getElementById('ease').value = 'ease-in-out';
    renderKeyframes();
    apply();
  });

  renderKeyframes();
  apply();
</script>
</body>
</html>
