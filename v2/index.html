<script>
  (function () {
    var video = document.querySelector('.bg-video');
    var frame = document.querySelector('.frame');
    if (!video || !frame) return;

    // 视频播完：进入改编页（story-end）
    video.addEventListener('ended', function () {
      frame.classList.add('story-end');
    });

    // 点 frame 任意空白（非 CTA / 顶部 nav / 重播按钮）也能进入改编页（用于演示快速切换）
    frame.addEventListener('click', function (e) {
      if (e.target.closest('.cta') || e.target.closest('.top-nav') || e.target.closest('.replay-btn')) return;
      if (frame.classList.contains('story-end')) return;
      frame.classList.add('story-end');
      try { video.pause(); } catch (err) {}
    });

    // 缩略视频上的"重播"按钮：退出改编页并重新播放视频
    var replayBtn = frame.querySelector('.replay-btn');
    if (replayBtn) {
      replayBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (!frame.classList.contains('story-end')) return;
        frame.classList.remove('story-end');
        try { video.currentTime = 0; } catch (err) {}
        try { video.play(); } catch (err) {}
      });
    }
  })();
</script>
